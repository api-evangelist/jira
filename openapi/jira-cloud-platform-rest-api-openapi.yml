components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        Basic authentication using an Atlassian account email and API token.
        Format: email:api_token, Base64 encoded. Generate API tokens at
        https://id.atlassian.com/manage-profile/security/api-tokens.
    oauth2:
      type: oauth2
      description: >-
        OAuth 2.0 authorization code grant (3LO) for Jira Cloud apps.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.atlassian.com/authorize
          tokenUrl: https://auth.atlassian.com/oauth/token
          scopes:
            read:jira-work: Read Jira project and issue data.
            write:jira-work: Create and edit Jira issues and projects.
            manage:jira-project: Manage Jira project settings.
            manage:jira-configuration: Manage Jira instance configuration.
            read:jira-user: Read Jira user information.
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Bearer token authentication using a personal access token (PAT) or
        OAuth 2.0 access token.
  parameters:
    issueIdOrKey:
      name: issueIdOrKey
      in: path
      description: The ID or key of the issue (e.g., 10001 or PROJ-123).
      required: true
      schema:
        type: string
      example: PROJ-123
    projectIdOrKey:
      name: projectIdOrKey
      in: path
      description: The ID or key of the project (e.g., 10000 or PROJ).
      required: true
      schema:
        type: string
      example: PROJ
  schemas:
    IssueBean:
      type: object
      description: A Jira issue with all fields and metadata.
      properties:
        id:
          type: string
          description: The ID of the issue.
          example: abc123
        key:
          type: string
          description: The key of the issue (e.g., PROJ-123).
          example: example_value
        self:
          type: string
          format: uri
          description: The URL of the issue in the REST API.
          example: https://www.example.com
        expand:
          type: string
          description: The expand options applied to the issue.
          example: example_value
        fields:
          $ref: '#/components/schemas/IssueFields'
        renderedFields:
          type: object
          description: HTML-rendered versions of the issue fields.
          additionalProperties: true
          example: example_value
        names:
          type: object
          description: Field name mapping for the issue.
          additionalProperties:
            type: string
          example: example_value
        schema:
          type: object
          description: JSON Schema for each field in the issue.
          additionalProperties: true
          example: example_value
        transitions:
          type: array
          description: Transitions available for the issue.
          items:
            $ref: '#/components/schemas/Transition'
          example: []
        changelog:
          $ref: '#/components/schemas/Changelog'
    IssueFields:
      type: object
      description: The fields of a Jira issue.
      properties:
        summary:
          type: string
          description: The summary (title) of the issue.
          example: example_value
        description:
          description: >-
            The description of the issue in Atlassian Document Format (ADF).
          oneOf:
          - $ref: '#/components/schemas/AtlassianDocumentFormat'
          - type: 'null'
          example: A sample description.
        issuetype:
          $ref: '#/components/schemas/IssueTypeDetails'
        project:
          $ref: '#/components/schemas/ProjectRef'
        status:
          $ref: '#/components/schemas/StatusDetails'
        priority:
          $ref: '#/components/schemas/Priority'
        assignee:
          oneOf:
          - $ref: '#/components/schemas/UserDetails'
          - type: 'null'
          description: The user assigned to the issue.
          example: example_value
        reporter:
          $ref: '#/components/schemas/UserDetails'
        creator:
          $ref: '#/components/schemas/UserDetails'
        labels:
          type: array
          description: Labels applied to the issue.
          items:
            type: string
          example: []
        components:
          type: array
          description: Components associated with the issue.
          items:
            $ref: '#/components/schemas/Component'
          example: []
        fixVersions:
          type: array
          description: Fix versions for the issue.
          items:
            $ref: '#/components/schemas/Version'
          example: []
        versions:
          type: array
          description: Affected versions for the issue.
          items:
            $ref: '#/components/schemas/Version'
          example: []
        resolution:
          oneOf:
          - $ref: '#/components/schemas/Resolution'
          - type: 'null'
          description: The resolution of the issue.
          example: example_value
        resolutiondate:
          type:
          - string
          - 'null'
          format: date-time
          description: The date the issue was resolved.
          example: '2026-01-15T10:30:00Z'
        created:
          type: string
          format: date-time
          description: The date and time the issue was created.
          example: '2026-01-15T10:30:00Z'
        updated:
          type: string
          format: date-time
          description: The date and time the issue was last updated.
          example: '2026-01-15T10:30:00Z'
        duedate:
          type:
          - string
          - 'null'
          format: date
          description: The due date of the issue.
          example: '2026-01-15'
        watches:
          $ref: '#/components/schemas/Watches'
        votes:
          $ref: '#/components/schemas/Votes'
        comment:
          $ref: '#/components/schemas/PageOfComments'
        worklog:
          $ref: '#/components/schemas/PageOfWorklogs'
        subtasks:
          type: array
          description: Sub-tasks of the issue.
          items:
            $ref: '#/components/schemas/IssueRef'
          example: []
        parent:
          oneOf:
          - $ref: '#/components/schemas/IssueRef'
          - type: 'null'
          description: The parent issue, if this is a sub-task.
          example: example_value
        environment:
          description: >-
            The environment in which the issue was found in ADF.
          oneOf:
          - $ref: '#/components/schemas/AtlassianDocumentFormat'
          - type: 'null'
          example: example_value
        attachment:
          type: array
          description: Attachments on the issue.
          items:
            $ref: '#/components/schemas/Attachment'
          example: []
        issuelinks:
          type: array
          description: Links to other issues.
          items:
            $ref: '#/components/schemas/IssueLink'
          example: []
      additionalProperties: true
    IssueCreateRequest:
      type: object
      description: Request body for creating an issue.
      properties:
        update:
          type: object
          description: >-
            A map of operations to perform on issue fields. Each key is a
            field ID and the value is an array of operations.
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/FieldUpdateOperation'
          example: example_value
        fields:
          type: object
          description: >-
            A map of field ID to field value for the issue. Required fields
            depend on the project and issue type.
          additionalProperties: true
          example: example_value
        transition:
          $ref: '#/components/schemas/TransitionRef'
        historyMetadata:
          type: object
          description: Metadata about the history entry.
          additionalProperties: true
          example: example_value
        properties:
          type: array
          description: Entity properties to set on the issue.
          items:
            $ref: '#/components/schemas/EntityProperty'
          example: []
      required:
      - fields
    IssueUpdateRequest:
      type: object
      description: Request body for editing an issue.
      properties:
        update:
          type: object
          description: >-
            A map of operations to perform on issue fields.
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/FieldUpdateOperation'
          example: example_value
        fields:
          type: object
          description: A map of field ID to field value for the issue.
          additionalProperties: true
          example: example_value
