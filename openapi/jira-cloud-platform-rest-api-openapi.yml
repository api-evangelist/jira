  /search:
    get:
      summary: Jira Search for Issues Using Jql (get)
      description: >-
        Searches for issues using JQL. If the JQL query expression is too large
        to be encoded as a query parameter, use the POST version of this
        resource. Sorting is supported via the ORDER BY clause in JQL.
      operationId: searchForIssuesUsingJql
      tags:
      - Issue Search
      externalDocs:
        description: API method documentation
        url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issue-search/#api-rest-api-3-search-get
      parameters:
      - name: jql
        in: query
        description: >-
          The JQL query string. For example: project = HSP AND issuetype =
          Bug. See JQL documentation for syntax.
        required: false
        schema:
          type: string
        example: project = PROJ AND status = Open ORDER BY created DESC
      - name: startAt
        in: query
        description: The index of the first item to return in a page of results (page offset).
        required: false
        schema:
          type: integer
          format: int32
          default: 0
        example: 10
      - name: maxResults
        in: query
        description: >-
          The maximum number of items to return per page. The maximum
          allowed value is determined by the Jira instance configuration,
          typically 100.
        required: false
        schema:
          type: integer
          format: int32
          default: 50
        example: 10
      - name: validateQuery
        in: query
        description: >-
          Whether to validate the JQL query and how to handle validation
          results. Accepted values: strict, warn, none.
        required: false
        schema:
          type: string
          enum:
          - strict
          - warn
          - none
          default: strict
        example: strict
      - name: fields
        in: query
        description: >-
          A list of fields to return for each issue. Use *all for all fields,
          *navigable for navigable fields only.
        required: false
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
        example: []
      - name: expand
        in: query
        description: >-
          Use expand to include additional information about issues in the
          response. Accepted values: renderedFields, names, schema,
          transitions, operations, editmeta, changelog,
          versionedRepresentations.
        required: false
        schema:
          type: string
        example: example_value
      - name: properties
        in: query
        description: >-
          A list of issue properties to return for each issue.
        required: false
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
        example: []
      - name: fieldsByKeys
        in: query
        description: >-
          Whether fields in fields are referenced by keys rather than IDs.
        required: false
        schema:
          type: boolean
          default: false
        example: true
      responses:
        '200':
          description: Search results returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResults'
              examples:
                Searchforissuesusingjql200Example:
                  summary: Default searchForIssuesUsingJql 200 response
                  x-microcks-default: true
                  value:
                    expand: example_value
                    startAt: 10
                    maxResults: 10
                    total: 10
                    issues:
                    - id: abc123
                      key: example_value
                      self: https://www.example.com
                      expand: example_value
                      renderedFields: example_value
                      names: example_value
                      schema: example_value
                      transitions: {}
                    warningMessages:
                    - example_value
                    names: example_value
                    schema: example_value
        '400':
          description: >-
            The JQL query is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorCollection'
              examples:
                Searchforissuesusingjql400Example:
                  summary: Default searchForIssuesUsingJql 400 response
                  x-microcks-default: true
                  value:
                    errorMessages:
                    - example_value
                    errors: example_value
                    status: 10
        '401':
          description: Authentication credentials are missing or invalid.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      summary: Jira Search for Issues Using Jql (post)
