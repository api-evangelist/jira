    AtlassianDocumentFormat:
      type: object
      description: >-
        Atlassian Document Format (ADF) representation of rich text content.
        ADF is a JSON-based format used in Jira Cloud REST API v3 for
        description, comment, and other rich text fields.
      required:
      - type
      - version
      - content
      properties:
        type:
          type: string
          enum:
          - doc
          description: The root node type. Always doc.
          example: doc
        version:
          type: integer
          description: The ADF version. Currently 1.
          enum:
          - 1
          example: 1
        content:
          type: array
          description: The content nodes of the document.
          items:
            type: object
            properties:
              type:
                type: string
                description: >-
                  The node type (e.g., paragraph, heading, bulletList,
                  orderedList, codeBlock, blockquote, table, mediaSingle,
                  rule).
              content:
                type: array
                description: Child content nodes.
                items:
                  type: object
                  properties:
                    type:
                      type: string
                      description: >-
                        The inline node type (e.g., text, hardBreak, mention,
                        emoji, inlineCard).
                    text:
                      type: string
                    marks:
                      type: array
                      items:
                        type: object
                        properties:
                          type:
                            type: string
                            description: >-
                              The mark type (e.g., strong, em, code, link,
                              underline, strike, textColor).
                          attrs:
                            type: object
                            additionalProperties: true
                  additionalProperties: true
              attrs:
                type: object
                additionalProperties: true
            additionalProperties: true
          example: []
