openapi: 3.1.0
info:
  title: Jira Cloud Platform REST API
  description: >-
    The Jira Cloud platform REST API v3 for building apps and integrations with
    Atlassian Jira. This specification covers core resources including issues,
    projects, and search (JQL). All responses use Atlassian Document Format
    (ADF) for rich text fields. Authentication is via OAuth 2.0 (3LO), API
    tokens with basic auth, or Atlassian Connect JWT.
  version: '3'
  license:
    name: Atlassian Developer Terms
    url: https://developer.atlassian.com/platform/marketplace/atlassian-developer-terms/
  termsOfService: https://www.atlassian.com/legal/cloud-terms-of-service
  contact:
    name: Atlassian Developer Support
    url: https://developer.atlassian.com/support
    email: ecosystem@atlassian.com
  x-atlassian-api-version: '3'
tags:
- name: Issue Comments
  description: Manage comments on issues.
- name: Issue Priorities
  description: Retrieve issue priority levels.
- name: Issue Search
  description: Search for issues using JQL (Jira Query Language).
  externalDocs:
    description: Jira Search REST API documentation
    url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issue-search/
- name: Issue Statuses
  description: Retrieve issue statuses.
- name: Issue Transitions
  description: Retrieve and perform workflow transitions on issues.
- name: Issue Types
  description: Retrieve and manage issue types for projects.
- name: Issues
  description: Create, read, update, delete, and transition Jira issues.
  externalDocs:
    description: Jira Issues REST API documentation
    url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issues/
- name: Projects
  description: Manage Jira projects including metadata, roles, and components.
  externalDocs:
    description: Jira Projects REST API documentation
    url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-projects/
servers:
- url: https://{domain}.atlassian.net/rest/api/3
  description: Jira Cloud instance
  variables:
    domain:
      description: Your Jira Cloud site subdomain (e.g., your-company).
      default: your-domain
externalDocs:
  description: Jira Cloud Platform REST API v3 Documentation
  url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/intro/
security:
- basicAuth: []
- oauth2: []
- bearerAuth: []
paths:
  /issue:
    post:
      summary: Jira Create Issue
      description: >-
        Creates an issue or a sub-task from a JSON representation. The fields
        that can be set on an issue depend on the connected Jira instance
        configuration, the project, and the issue type. You can determine
        appropriate field values using the Create Issue Metadata endpoint.
      operationId: createIssue
      tags:
      - Issues
      externalDocs:
        description: API method documentation
        url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issues/#api-rest-api-3-issue-post
      parameters:
      - name: updateHistory
        in: query
        description: >-
          Whether the project in which the issue is created is added to the
          user's Recently viewed project list, as shown under Projects in Jira.
        required: false
        schema:
          type: boolean
          default: false
        example: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueCreateRequest'
            example:
              fields:
                project:
                  key: PROJ
                summary: Main order flow fails when item is sold out
                description:
                  type: doc
                  version: 1
                  content:
                  - type: paragraph
                    content:
                    - type: text
                      text: Order flow errors when an item is sold out.
                issuetype:
                  name: Bug
                priority:
                  name: High
                labels:
                - bugfix
                - production
                assignee:
                  accountId: 5b10a2844c20165700ede21g
      responses:
        '201':
          description: Issue created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedIssue'
              examples:
                Createissue201Example:
                  summary: Default createIssue 201 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    key: example_value
                    self: https://www.example.com
                    transition:
                      status: 10
                      errorCollection:
                        errorMessages: {}
                        errors: example_value
                        status: 10
        '400':
          description: >-
            The input is invalid, including if the request body is missing or
            has invalid fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorCollection'
              examples:
                Createissue400Example:
                  summary: Default createIssue 400 response
                  x-microcks-default: true
                  value:
                    errorMessages:
                    - example_value
                    errors: example_value
                    status: 10
        '401':
          description: Authentication credentials are missing or invalid.
        '403':
          description: The user does not have permission to create issues in the project.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /issue/{issueIdOrKey}:
    get:
      summary: Jira Get Issue
      description: >-
        Returns the details for an issue. The issue is identified by its ID or
        key. The returned issue includes all fields, comment count, names,
        schema, transitions, editmeta, changelog, and rendered fields.
      operationId: getIssue
      tags:
      - Issues
      externalDocs:
        description: API method documentation
        url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issues/#api-rest-api-3-issue-issueidorkey-get
      parameters:
      - $ref: '#/components/parameters/issueIdOrKey'
      - name: fields
        in: query
        description: >-
          A list of fields to return for the issue. Use it to retrieve a
          subset of fields. Allowed values include any field name, *all for
          all fields, *navigable for navigable fields.
        required: false
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
        example: []
      - name: expand
        in: query
        description: >-
          Use expand to include additional information in the response.
          Accepted values: renderedFields, names, schema, transitions,
          operations, editmeta, changelog, versionedRepresentations,
          fields.
        required: false
        schema:
          type: string
        example: example_value
      - name: properties
        in: query
        description: >-
          A list of issue properties to return for the issue. By default no
          properties are returned.
        required: false
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
        example: []
      - name: fieldsByKeys
        in: query
        description: >-
          Whether fields in fields are referenced by keys rather than IDs.
        required: false
        schema:
          type: boolean
          default: false
        example: true
      responses:
        '200':
          description: Issue details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueBean'
              examples:
                Getissue200Example:
                  summary: Default getIssue 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    key: example_value
                    self: https://www.example.com
                    expand: example_value
                    fields:
                      summary: example_value
                      description: A sample description.
                      assignee: example_value
                      labels:
                      - {}
                      components:
                      - {}
                      fixVersions:
                      - {}
                      versions:
                      - {}
                      resolution: example_value
                      resolutiondate: '2026-01-15T10:30:00Z'
                      created: '2026-01-15T10:30:00Z'
                      updated: '2026-01-15T10:30:00Z'
                      duedate: '2026-01-15'
                      subtasks:
                      - {}
                      parent: example_value
                      environment: example_value
                      attachment:
                      - {}
                      issuelinks:
                      - {}
                    renderedFields: example_value
                    names: example_value
                    schema: example_value
                    transitions:
                    - id: abc123
                      name: Example Title
                      hasScreen: true
                      isGlobal: true
                      isInitial: true
                      isConditional: true
                      fields: example_value
                    changelog:
                      startAt: 10
                      maxResults: 10
                      total: 10
                      histories:
                      - {}
        '401':
          description: Authentication credentials are missing or invalid.
        '404':
          description: The issue was not found or the user does not have permission to view it.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    put:
      summary: Jira Edit Issue
      description: >-
        Edits an issue. A transition may be applied and issue properties updated
        as part of the edit. The editable fields depend on the connected Jira
        instance configuration, the project, and the issue type.
      operationId: editIssue
      tags:
      - Issues
      externalDocs:
        description: API method documentation
        url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issues/#api-rest-api-3-issue-issueidorkey-put
      parameters:
      - $ref: '#/components/parameters/issueIdOrKey'
      - name: notifyUsers
        in: query
        description: >-
          Whether a notification email about the issue update is sent to all
          watchers. Requires administer Jira global permission.
        required: false
        schema:
          type: boolean
          default: true
        example: true
      - name: overrideScreenSecurity
        in: query
        description: >-
          Whether screen security is overridden to enable hidden fields to be
          edited. Requires administer Jira global permission.
        required: false
        schema:
          type: boolean
          default: false
        example: true
      - name: overrideEditableFlag
        in: query
        description: >-
          Whether the non-editable flag is overridden to enable uneditable
          fields to be edited. Requires administer Jira global permission.
        required: false
        schema:
          type: boolean
          default: false
        example: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueUpdateRequest'
            examples:
              EditissueRequestExample:
                summary: Default editIssue request
                x-microcks-default: true
                value:
                  update: example_value
                  fields: example_value
                  transition:
                    id: abc123
                  historyMetadata: example_value
                  properties:
                  - key: example_value
                    value: example_value
      responses:
        '204':
          description: Issue updated successfully.
        '400':
          description: The input is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorCollection'
              examples:
                Editissue400Example:
                  summary: Default editIssue 400 response
                  x-microcks-default: true
                  value:
                    errorMessages:
                    - example_value
                    errors: example_value
                    status: 10
        '401':
          description: Authentication credentials are missing or invalid.
        '403':
          description: The user does not have permission to edit the issue.
        '404':
          description: The issue was not found or the user does not have permission to view it.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      summary: Jira Delete Issue
      description: >-
        Deletes an issue. An issue can only be deleted if it has no sub-tasks,
        unless deleteSubtasks is set to true.
      operationId: deleteIssue
      tags:
      - Issues
      externalDocs:
        description: API method documentation
        url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issues/#api-rest-api-3-issue-issueidorkey-delete
      parameters:
      - $ref: '#/components/parameters/issueIdOrKey'
      - name: deleteSubtasks
        in: query
        description: Whether the issue's sub-tasks are also deleted.
        required: false
        schema:
          type: string
          enum:
          - 'true'
          - 'false'
          default: 'false'
        example: 'true'
      responses:
        '204':
          description: Issue deleted successfully.
        '400':
          description: The issue has sub-tasks and deleteSubtasks is not set to true.
        '401':
          description: Authentication credentials are missing or invalid.
        '403':
          description: The user does not have permission to delete the issue.
        '404':
          description: The issue was not found or the user does not have permission to view it.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /issue/{issueIdOrKey}/transitions:
    get:
      summary: Jira Get Transitions
      description: >-
        Returns either all transitions or a transition that can be performed by
        the user on an issue, based on the issue's status.
      operationId: getTransitions
      tags:
      - Issue Transitions
      externalDocs:
        description: API method documentation
        url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issues/#api-rest-api-3-issue-issueidorkey-transitions-get
      parameters:
      - $ref: '#/components/parameters/issueIdOrKey'
      - name: expand
        in: query
        description: >-
          Use expand to include additional information about transitions in
          the response. Accepted values: transitions.fields.
        required: false
        schema:
          type: string
        example: example_value
      - name: transitionId
        in: query
        description: The ID of the transition.
        required: false
        schema:
          type: string
        example: '500123'
      - name: skipRemoteOnlyCondition
        in: query
        description: >-
          Whether transitions with the condition Hide From User Condition are
          included in the response.
        required: false
        schema:
          type: boolean
          default: false
        example: true
      - name: includeUnavailableTransitions
        in: query
        description: Whether details of transitions that fail a condition are included.
        required: false
        schema:
          type: boolean
          default: false
        example: true
      responses:
        '200':
          description: Transitions returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transitions'
              examples:
                Gettransitions200Example:
                  summary: Default getTransitions 200 response
                  x-microcks-default: true
                  value:
                    expand: example_value
                    transitions:
                    - id: abc123
                      name: Example Title
                      hasScreen: true
                      isGlobal: true
                      isInitial: true
                      isConditional: true
                      fields: example_value
        '401':
          description: Authentication credentials are missing or invalid.
        '404':
          description: The issue was not found or the user does not have permission to view it.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      summary: Jira Transition Issue
      description: >-
        Performs an issue transition and, optionally, updates the fields and adds
        a comment. The fields that can be set depend on the transition and
        the connected Jira instance configuration.
      operationId: doTransition
      tags:
      - Issue Transitions
      externalDocs:
        description: API method documentation
        url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issues/#api-rest-api-3-issue-issueidorkey-transitions-post
      parameters:
      - $ref: '#/components/parameters/issueIdOrKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueTransitionRequest'
            example:
              transition:
                id: '5'
              fields:
                resolution:
                  name: Fixed
      responses:
        '204':
          description: Transition performed successfully.
        '400':
          description: The transition or field values are invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorCollection'
              examples:
                Dotransition400Example:
                  summary: Default doTransition 400 response
                  x-microcks-default: true
                  value:
                    errorMessages:
                    - example_value
                    errors: example_value
                    status: 10
        '401':
          description: Authentication credentials are missing or invalid.
        '404':
          description: The issue was not found or the user does not have permission to view it.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /issue/{issueIdOrKey}/comment:
    get:
      summary: Jira Get Comments
      description: >-
        Returns all comments for an issue. Comments are ordered by created date
        in ascending order by default.
      operationId: getComments
      tags:
      - Issue Comments
      externalDocs:
        description: API method documentation
        url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issue-comments/#api-rest-api-3-issue-issueidorkey-comment-get
      parameters:
      - $ref: '#/components/parameters/issueIdOrKey'
      - name: startAt
        in: query
        description: The index of the first item to return in a page of results (page offset).
        required: false
        schema:
          type: integer
          format: int64
          default: 0
        example: 10
      - name: maxResults
        in: query
        description: The maximum number of items to return per page.
        required: false
        schema:
          type: integer
          format: int32
          default: 50
        example: 10
      - name: orderBy
        in: query
        description: >-
          The order of comments returned. Accepted values: created (ascending
          by default), -created (descending).
        required: false
        schema:
          type: string
          enum:
          - created
          - '-created'
        example: created
      - name: expand
        in: query
        description: >-
          Use expand to include additional information about comments in the
          response. Accepted values: renderedBody.
        required: false
        schema:
          type: string
        example: example_value
      responses:
        '200':
          description: Comments returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfComments'
              examples:
                Getcomments200Example:
                  summary: Default getComments 200 response
                  x-microcks-default: true
                  value:
                    startAt: 10
                    maxResults: 10
                    total: 10
                    comments:
                    - self: https://www.example.com
                      id: abc123
                      renderedBody: example_value
                      created: '2026-01-15T10:30:00Z'
                      updated: '2026-01-15T10:30:00Z'
                      jsdPublic: true
        '401':
          description: Authentication credentials are missing or invalid.
        '404':
          description: The issue was not found or the user does not have permission to view it.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      summary: Jira Add Comment
      description: >-
        Adds a comment to an issue. The comment body uses Atlassian Document
        Format (ADF).
      operationId: addComment
      tags:
      - Issue Comments
      externalDocs:
        description: API method documentation
        url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issue-comments/#api-rest-api-3-issue-issueidorkey-comment-post
      parameters:
      - $ref: '#/components/parameters/issueIdOrKey'
      - name: expand
        in: query
        description: >-
          Use expand to include additional information about comments in the
          response. Accepted values: renderedBody.
        required: false
        schema:
          type: string
        example: example_value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Comment'
            example:
              body:
                type: doc
                version: 1
                content:
                - type: paragraph
                  content:
                  - type: text
                    text: This is a comment using Atlassian Document Format.
              visibility:
                type: role
                value: Administrators
      responses:
        '201':
          description: Comment added successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
              examples:
                Addcomment201Example:
                  summary: Default addComment 201 response
                  x-microcks-default: true
                  value:
                    self: https://www.example.com
                    id: abc123
                    author:
                      self: https://www.example.com
                      accountId: '500123'
                      emailAddress: user@example.com
                      displayName: example_value
                      active: true
                      timeZone: example_value
                      accountType: atlassian
                    body:
                      type: doc
                      version: 1
                      content:
                      - {}
                    renderedBody: example_value
                    updateAuthor:
                      self: https://www.example.com
                      accountId: '500123'
                      emailAddress: user@example.com
                      displayName: example_value
                      active: true
                      timeZone: example_value
                      accountType: atlassian
                    created: '2026-01-15T10:30:00Z'
                    updated: '2026-01-15T10:30:00Z'
                    visibility:
                      type: group
                      value: example_value
                      identifier: example_value
                    jsdPublic: true
        '400':
          description: The input is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorCollection'
              examples:
                Addcomment400Example:
                  summary: Default addComment 400 response
                  x-microcks-default: true
                  value:
                    errorMessages:
                    - example_value
                    errors: example_value
                    status: 10
        '401':
          description: Authentication credentials are missing or invalid.
        '404':
          description: The issue was not found or the user does not have permission to view it.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /project:
    get:
      summary: Jira Get All Projects
      description: >-
        Returns all projects visible to the user. Deprecated, use Get projects
        paginated that supports search and pagination.
      operationId: getAllProjects
      tags:
      - Projects
      externalDocs:
        description: API method documentation
        url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-projects/#api-rest-api-3-project-get
      parameters:
      - name: expand
        in: query
        description: >-
          Use expand to include additional information in the response.
          Accepted values: description, issueTypes, lead, projectKeys, url.
        required: false
        schema:
          type: string
        example: example_value
      - name: recent
        in: query
        description: >-
          Returns projects the user has accessed in the last given number of
          projects, up to 20.
        required: false
        schema:
          type: integer
          format: int32
        example: 10
      - name: properties
        in: query
        description: >-
          A list of project properties to return for each project.
        required: false
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
        example: []
      responses:
        '200':
          description: Projects returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
              examples:
                Getallprojects200Example:
                  summary: Default getAllProjects 200 response
                  x-microcks-default: true
                  value:
                  - self: https://www.example.com
                    id: abc123
                    key: example_value
                    name: Example Title
                    description: A sample description.
                    lead:
                      self: https://www.example.com
                      accountId: '500123'
                      emailAddress: user@example.com
                      displayName: example_value
                      active: true
                      timeZone: example_value
                      accountType: atlassian
                    components:
                    - {}
                    issueTypes:
                    - {}
                    url: https://www.example.com
                    assigneeType: PROJECT_LEAD
                    versions:
                    - {}
                    roles: example_value
                    avatarUrls:
                      16x16: https://www.example.com
                      24x24: https://www.example.com
                      32x32: https://www.example.com
                      48x48: https://www.example.com
                    projectCategory:
                      self: https://www.example.com
                      id: abc123
                      name: Example Title
                      description: A sample description.
                    projectTypeKey: software
                    simplified: true
                    style: classic
                    archived: true
                    deleted: true
                    insight:
                      totalIssueCount: 10
                      lastIssueUpdateTime: '2026-01-15T10:30:00Z'
        '401':
          description: Authentication credentials are missing or invalid.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /project/search:
    get:
      summary: Jira Get Projects Paginated
      description: >-
        Returns a paginated list of projects visible to the user. This
        operation can be filtered by project type, category, and action.
      operationId: searchProjects
      tags:
      - Projects
      externalDocs:
        description: API method documentation
        url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-projects/#api-rest-api-3-project-search-get
      parameters:
      - name: startAt
        in: query
        description: The index of the first item to return in a page of results (page offset).
        required: false
        schema:
          type: integer
          format: int64
          default: 0
        example: 10
      - name: maxResults
        in: query
        description: The maximum number of items to return per page.
        required: false
        schema:
          type: integer
          format: int32
          default: 50
        example: 10
      - name: orderBy
        in: query
        description: >-
          Order the results by a field. Accepted values: category, key,
          name, owner, issueCount, lastIssueUpdatedTime, archivedDate.
          Prefix with + or - for ascending/descending.
        required: false
        schema:
          type: string
          default: key
        example: example_value
      - name: query
        in: query
        description: Filter results using a literal string match on project name or key.
        required: false
        schema:
          type: string
        example: example_value
      - name: typeKey
        in: query
        description: >-
          The type key of the project. Accepted values: business, service_desk,
          software.
        required: false
        schema:
          type: string
        example: example_value
      - name: categoryId
        in: query
        description: The ID of the project category to filter by.
        required: false
        schema:
          type: integer
          format: int64
        example: '500123'
      - name: action
        in: query
        description: >-
          Filter results by what the user has permission to do. Accepted
          values: view, browse, edit, create.
        required: false
        schema:
          type: string
          default: view
        example: example_value
      - name: expand
        in: query
        description: >-
          Use expand to include additional information in the response.
          Accepted values: description, projectKeys, lead, issueTypes, url,
