          type: boolean
          example: true
        released:
          type: boolean
          example: true
        releaseDate:
          type: string
          format: date
          example: '2026-01-15'
        startDate:
          type: string
          format: date
          example: '2026-01-15'
        overdue:
          type: boolean
          example: true
        projectId:
          type: integer
          format: int64
          example: '500123'
    ErrorCollection:
      type: object
