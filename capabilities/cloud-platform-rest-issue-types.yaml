naftiko: 1.0.0-alpha2
info:
  label: Jira Cloud Platform REST API — Issue Types
  description: 'Jira Cloud Platform REST API — Issue Types. 1 operations. Lead operation: Jira Get All Issue Types for User.
    Self-contained Naftiko capability covering one Jira business surface.'
  tags:
  - Jira
  - Issue Types
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JIRA_API_KEY: JIRA_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-platform-rest-issue-types
    baseUri: https://{domain}.atlassian.net/rest/api/3
    description: Jira Cloud Platform REST API — Issue Types business capability. Self-contained, no shared references.
    resources:
    - name: issuetype
      path: /issuetype
      operations:
      - name: getissuealltypes
        method: GET
        description: Jira Get All Issue Types for User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.JIRA_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-platform-rest-issue-types-rest
    port: 8080
    description: REST adapter for Jira Cloud Platform REST API — Issue Types. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/issuetype
      name: issuetype
      description: REST surface for issuetype.
      operations:
      - method: GET
        name: getissuealltypes
        description: Jira Get All Issue Types for User
        call: cloud-platform-rest-issue-types.getissuealltypes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-platform-rest-issue-types-mcp
    port: 9090
    transport: http
    description: MCP adapter for Jira Cloud Platform REST API — Issue Types. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: jira-get-all-issue-types
      description: Jira Get All Issue Types for User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-platform-rest-issue-types.getissuealltypes
      outputParameters:
      - type: object
        mapping: $.
