naftiko: "1.0.0-alpha1"

info:
  label: "Jira Cloud Platform REST API"
  description: "Jira Cloud platform REST API v3 for managing issues, projects, workflows, and search using JQL."
  tags:
    - Jira
    - Project Management
    - Issue Tracking
    - Agile
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      JIRA_API_TOKEN: JIRA_API_TOKEN
      JIRA_EMAIL: JIRA_EMAIL

capability:
  consumes:
    - type: http
      namespace: jira-cloud
      baseUri: https://{domain}.atlassian.net/rest/api/3
      description: "Jira Cloud Platform REST API for issue and project management."
      authentication:
        type: basic
        username: "{{JIRA_EMAIL}}"
        password: "{{JIRA_API_TOKEN}}"
      resources:
        - name: issues
          path: /issue
          description: "Create, read, update, delete, and transition Jira issues."
          operations:
            - name: create-issue
              method: POST
              description: "Create a new Jira issue."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  fields:
                    project:
                      key: "{{tools.project_key}}"
                    summary: "{{tools.summary}}"
                    issuetype:
                      name: "{{tools.issue_type}}"
            - name: get-issue
              method: GET
              description: "Get issue details by ID or key."
              inputParameters:
                - name: issueIdOrKey
                  in: path
                  type: string
                  required: true
                  description: "Issue ID or key."
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Fields to return."
                - name: expand
                  in: query
                  type: string
                  required: false
                  description: "Additional info to include."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: edit-issue
              method: PUT
              description: "Edit an existing issue."
              inputParameters:
                - name: issueIdOrKey
                  in: path
                  type: string
                  required: true
                  description: "Issue ID or key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-issue
              method: DELETE
              description: "Delete an issue."
              inputParameters:
                - name: issueIdOrKey
                  in: path
                  type: string
                  required: true
                  description: "Issue ID or key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-transitions
              method: GET
              description: "Get available transitions for an issue."
              inputParameters:
                - name: issueIdOrKey
                  in: path
                  type: string
                  required: true
                  description: "Issue ID or key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: do-transition
              method: POST
              description: "Perform a workflow transition on an issue."
              inputParameters:
                - name: issueIdOrKey
                  in: path
                  type: string
                  required: true
                  description: "Issue ID or key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: comments
          path: /issue
          description: "Manage issue comments."
          operations:
            - name: get-comments
              method: GET
              description: "Get comments on an issue."
              inputParameters:
                - name: issueIdOrKey
                  in: path
                  type: string
                  required: true
                  description: "Issue ID or key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-comment
              method: POST
              description: "Add a comment to an issue."
              inputParameters:
                - name: issueIdOrKey
                  in: path
                  type: string
                  required: true
                  description: "Issue ID or key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: projects
          path: /project
          description: "Manage Jira projects."
          operations:
            - name: get-all-projects
              method: GET
              description: "List all projects."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: search-projects
              method: GET
              description: "Search projects with filtering."
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Search query."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-project
              method: GET
              description: "Get a project by ID or key."
              inputParameters:
                - name: projectIdOrKey
                  in: path
                  type: string
                  required: true
                  description: "Project ID or key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: search
          path: /search
          description: "Search for issues using JQL."
          operations:
            - name: search-issues-jql
              method: GET
              description: "Search issues using JQL query."
              inputParameters:
                - name: jql
                  in: query
                  type: string
                  required: true
                  description: "JQL query string."
                - name: maxResults
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
                - name: startAt
                  in: query
                  type: integer
                  required: false
                  description: "Index of first result."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: search-issues-jql-post
              method: POST
              description: "Search issues using JQL with POST body."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: statuses
          path: /statuses
          description: "Issue statuses."
          operations:
            - name: get-all-statuses
              method: GET
              description: "Get all issue statuses."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: issue-types
          path: /issuetype
          description: "Issue types."
          operations:
            - name: get-all-issue-types
              method: GET
              description: "Get all issue types."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: priorities
          path: /priority
          description: "Issue priorities."
          operations:
            - name: get-priorities
              method: GET
              description: "Get all priorities."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: jira-cloud-api
      resources:
        - path: /v1/issues
          name: issues
          description: "Issue operations."
          operations:
            - method: POST
              name: create-issue
              description: "Create a Jira issue."
              call: "jira-cloud.create-issue"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/issues/{issueIdOrKey}
          name: issue-detail
          description: "Single issue operations."
          operations:
            - method: GET
              name: get-issue
              description: "Get issue details."
              call: "jira-cloud.get-issue"
              with:
                issueIdOrKey: "rest.issueIdOrKey"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/search
          name: search
          description: "JQL search."
          operations:
            - method: GET
              name: search-issues
              description: "Search issues with JQL."
              call: "jira-cloud.search-issues-jql"
              with:
                jql: "rest.jql"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/projects
          name: projects
          description: "Project operations."
          operations:
            - method: GET
              name: list-projects
              description: "List all projects."
              call: "jira-cloud.get-all-projects"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: jira-cloud-mcp
      transport: http
      tools:
        - name: create-issue
          description: "Create a new Jira issue."
          hints:
            readOnly: false
          call: "jira-cloud.create-issue"
          with:
            project_key: "tools.project_key"
            summary: "tools.summary"
            issue_type: "tools.issue_type"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-issue
          description: "Get Jira issue details by ID or key."
          hints:
            readOnly: true
            idempotent: true
          call: "jira-cloud.get-issue"
          with:
            issueIdOrKey: "tools.issueIdOrKey"
          outputParameters:
            - type: object
              mapping: "$."
        - name: edit-issue
          description: "Edit an existing Jira issue."
          hints:
            readOnly: false
            idempotent: true
          call: "jira-cloud.edit-issue"
          with:
            issueIdOrKey: "tools.issueIdOrKey"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-issue
          description: "Delete a Jira issue."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "jira-cloud.delete-issue"
          with:
            issueIdOrKey: "tools.issueIdOrKey"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-transitions
          description: "Get available workflow transitions for an issue."
          hints:
            readOnly: true
            idempotent: true
          call: "jira-cloud.get-transitions"
          with:
            issueIdOrKey: "tools.issueIdOrKey"
          outputParameters:
            - type: object
              mapping: "$."
        - name: do-transition
          description: "Perform a workflow transition on an issue."
          hints:
            readOnly: false
          call: "jira-cloud.do-transition"
          with:
            issueIdOrKey: "tools.issueIdOrKey"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-comments
          description: "Get comments on a Jira issue."
          hints:
            readOnly: true
            idempotent: true
          call: "jira-cloud.get-comments"
          with:
            issueIdOrKey: "tools.issueIdOrKey"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-comment
          description: "Add a comment to a Jira issue."
          hints:
            readOnly: false
          call: "jira-cloud.add-comment"
          with:
            issueIdOrKey: "tools.issueIdOrKey"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-issues
          description: "Search Jira issues using JQL."
          hints:
            readOnly: true
            idempotent: true
            openWorld: true
          call: "jira-cloud.search-issues-jql"
          with:
            jql: "tools.jql"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-projects
          description: "List all Jira projects."
          hints:
            readOnly: true
            idempotent: true
          call: "jira-cloud.get-all-projects"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-project
          description: "Get a Jira project by ID or key."
          hints:
            readOnly: true
            idempotent: true
          call: "jira-cloud.get-project"
          with:
            projectIdOrKey: "tools.projectIdOrKey"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-all-statuses
          description: "Get all Jira issue statuses."
          hints:
            readOnly: true
            idempotent: true
          call: "jira-cloud.get-all-statuses"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-all-issue-types
          description: "Get all Jira issue types."
          hints:
            readOnly: true
            idempotent: true
          call: "jira-cloud.get-all-issue-types"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-priorities
          description: "Get all Jira issue priorities."
          hints:
            readOnly: true
            idempotent: true
          call: "jira-cloud.get-priorities"
          outputParameters:
            - type: object
              mapping: "$."
